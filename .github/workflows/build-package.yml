name: Build Package

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  bundle-extension:
    runs-on: [ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Build tree_clipper
        run: uv build --package tree_clipper --no-sources --output-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: tree-clipper-package
          path: dist/