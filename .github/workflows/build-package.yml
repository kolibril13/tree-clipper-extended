name: Build Package

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-package:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2

      - name: Build tree_clipper
        run: uv build --package tree_clipper --no-sources --out-dir dist

      - uses: actions/upload-artifact@v7
        with:
          name: tree-clipper-package
          path: dist/